<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Venüs Kafe - İletişim</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="index.html">
        <img src="logo.png" alt="Venüs Cafe Logo">
      </a>
      <div class="lang-select">
        <button class="lang-btn" data-lang="tr" aria-pressed="false">TR</button>
        <button class="lang-btn" data-lang="en" aria-pressed="false">EN</button>
      </div>
      <button class="hamburger" aria-label="Menü" aria-expanded="false"><span></span></button>
      <nav class="main-nav">
        <a href="index.html" data-i18n="nav.home">ANA SAYFA</a>
        <a href="about.html" data-i18n="nav.about">HAKKIMIZDA</a>
        <a href="menu.html" data-i18n="nav.menu">MENÜ</a>
        <a href="media.html" data-i18n="nav.media">GALERİ</a>
        <a href="contact.html" class="active" data-i18n="nav.contact">İLETİŞİM</a>
      </nav>
    </div>
  </header>

  <main class="container contact-page">
    <h1 data-i18n="contact.title">İletişim</h1>
    <!-- Web3Forms integration: posts to https://api.web3forms.com/submit -->
    <form id="contactForm" action="https://api.web3forms.com/submit" method="POST" class="contact-form">
      <!-- Provided access key -->
      <input type="hidden" name="access_key" value="1ddd1239-ede3-4be2-a2eb-9bfe13412c2e">
      <label><span data-i18n="contact.first_name">Ad</span>
        <input type="text" name="first_name" required>
      </label>
      <label><span data-i18n="contact.last_name">Soyad</span>
        <input type="text" name="last_name" required>
      </label>
      <label><span data-i18n="contact.email">E-posta</span>
        <input type="email" name="email" required>
      </label>
      <label><span data-i18n="contact.subject">Konu</span>
        <input type="text" name="subject">
      </label>
      <label><span data-i18n="contact.message">Mesaj</span>
        <textarea name="message" rows="6"></textarea>
      </label>
      <button type="submit" class="btn" data-i18n="contact.submit">Gönder</button>
      <div id="formMessage" aria-live="polite" style="margin-top:0.6rem;color:var(--accent);display:none"></div>
    </form>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Çalışma Saatleri: 08:00 - 22:00 | Adres: Örnek Mah. Kahve Sk. No:1</p>
      <p>&copy; 2026 Venüs Kafe</p>
    </div>
  </footer>
  <!-- Web3Forms submission handler (fetch-based with graceful fallback) -->
  <script>
    (function(){
      const form = document.getElementById('contactForm');
      const msg = document.getElementById('formMessage');

      async function handleResponse(res){
        try {
          const json = await res.json();
          if(res.ok && (json.success || json.message)){
            msg.style.display = 'block';
            msg.textContent = json.message || 'Mesajınız başarıyla gönderildi. Teşekkürler!';
            form.reset();
            return;
          }
          msg.style.display = 'block';
          msg.textContent = json.message || 'Gönderim sırasında hata oluştu. Lütfen daha sonra tekrar deneyin.';
          console.error('Web3Forms error:', json);
        } catch(err){
          msg.style.display = 'block';
          msg.textContent = 'Sunucu yanıtı işlenemedi.';
          console.error(err);
        }
      }

      form.addEventListener('submit', async function(e){
        e.preventDefault();
        msg.style.display = 'none';

        const first = form.querySelector('[name="first_name"]').value.trim();
        const emailVal = form.querySelector('[name="email"]').value.trim();
        if(!first || !emailVal){
          msg.style.display = 'block';
          msg.textContent = 'Lütfen adınızı ve e-posta adresinizi girin.';
          return;
        }

        msg.style.display = 'block';
        msg.textContent = 'Gönderiliyor...';

        const fd = new FormData(form);
        try {
          const res = await fetch(form.action, { method: 'POST', body: fd });
          await handleResponse(res);
        } catch(err){
          msg.style.display = 'block';
          msg.textContent = 'Gönderim sırasında hata oluştu. Lütfen daha sonra tekrar deneyin.';
          console.error(err);
        }
      });
    })();
  </script>
  <script>
    (function(){
      const translations = {
        tr: {
          'nav.home':'ANA SAYFA','nav.about':'HAKKIMIZDA','nav.menu':'MENÜ','nav.media':'GALERİ','nav.contact':'İLETİŞİM',
          'contact.title':'İletişim','contact.first_name':'Ad','contact.last_name':'Soyad','contact.email':'E-posta','contact.subject':'Konu','contact.message':'Mesaj','contact.submit':'Gönder'
        },
        en: {
          'nav.home':'HOME','nav.about':'ABOUT','nav.menu':'MENU','nav.media':'GALLERY','nav.contact':'CONTACT',
          'contact.title':'Contact','contact.first_name':'First Name','contact.last_name':'Last Name','contact.email':'Email','contact.subject':'Subject','contact.message':'Message','contact.submit':'Send'
        }
      };
      function applyLang(lang){ document.querySelectorAll('[data-i18n]').forEach(el=>{ const key=el.dataset.i18n; if(translations[lang]&&translations[lang][key]) el.textContent = translations[lang][key]; }); localStorage.setItem('site_lang', lang); }
      const buttons = document.querySelectorAll('.lang-btn'); const init = localStorage.getItem('site_lang')||'tr'; function setActiveBtn(lang){ buttons.forEach(b=>{ const is = b.dataset.lang===lang; b.classList.toggle('active', is); b.setAttribute('aria-pressed', String(is)); }); } setActiveBtn(init); applyLang(init); buttons.forEach(b=>b.addEventListener('click', ()=>{ applyLang(b.dataset.lang); setActiveBtn(b.dataset.lang); }));
    })();
  </script>
  <script>
    (function(){
      const ham = document.querySelector('.hamburger');
      const nav = document.querySelector('.main-nav');
      if(!ham || !nav) return;
      ham.addEventListener('click', ()=>{
        const open = nav.classList.toggle('mobile-open');
        ham.classList.toggle('open', open);
        ham.setAttribute('aria-expanded', String(open));
      });
      nav.querySelectorAll('a').forEach(a=>a.addEventListener('click', ()=>{ nav.classList.remove('mobile-open'); ham.classList.remove('open'); ham.setAttribute('aria-expanded','false'); }));
    })();
  </script>
</body>
</html>
